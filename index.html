<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Norway Vs Cote d'Ivoire - 2026 Match Tickets</title>
    <style>
        :root {
            --primary-color: #0d1b2a;
            --sold-color: #d90429;
            --card-bg: #ffffff;
            --text-color: #1b263b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f0f2f5;
            color: var(--text-color);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            width: 100%;
            max-width: 600px;
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 10px;
            font-size: 1.8rem;
        }

        .code-container {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-top: 15px;
        }

        .code-container input {
            padding: 10px;
            width: 70%;
            border: 2px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
            text-align: center;
            text-transform: uppercase;
        }

        .tickets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }

        .ticket {
            background: var(--card-bg);
            border-radius: 12px;
            border-left: 8px solid var(--primary-color);
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            position: relative;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .ticket.sold {
            background: var(--sold-color);
            color: white;
            border-left-color: #80001c;
        }

        .ticket-header {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            border-bottom: 1px dashed #ccc;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .ticket.sold .ticket-header {
            border-bottom-color: rgba(255,255,255,0.4);
        }

        .team-section {
            margin-bottom: 12px;
        }

        .team-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.8;
        }

        .player-info {
            font-size: 1.1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .jersey {
            background: #e0e1dd;
            color: var(--primary-color);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .ticket.sold .jersey {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .hidden-name {
            filter: blur(5px);
            user-select: none;
            background: #ddd;
            border-radius: 4px;
            padding: 0 5px;
        }

        .ticket.sold .hidden-name {
            background: rgba(255,255,255,0.3);
        }

        .revealed .hidden-name {
            filter: none !important;
            background: transparent !important;
            user-select: auto;
        }

        .buyer-section {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }

        .ticket.sold .buyer-section {
            border-top-color: rgba(255,255,255,0.2);
        }

        .buyer-section input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-bottom: 8px;
        }

        .buyer-section button {
            width: 100%;
            padding: 8px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .ticket.sold .buyer-section button {
            background: white;
            color: var(--sold-color);
        }

        .sold-text {
            display: none;
            font-weight: bold;
            text-align: center;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .ticket.sold .sold-text {
            display: block;
        }

        .ticket.sold .buyer-input-group {
            display: none;
        }
    </style>
</head>
<body>

    <header>
        <h1>Norway 🇳🇴 Vs 🇨🇮 Cote d'Ivoire</h1>
        <p>Enter the master code to reveal hidden ticket players</p>
        <div class="code-container">
            <input type="text" id="revealCode" placeholder="Enter Reveal Code Here..." oninput="checkCode()">
        </div>
    </header>

    <div class="tickets-grid" id="ticketsContainer"></div>

    <script>
        // Latest Outfield Squads for FIFA World Cup 2026 (Excluding Goalkeepers)
        const norwayPlayers = [
            { name: "Kristoffer Ajer", jersey: "3" }, { name: "Leo Østigård", jersey: "4" },
            { name: "Torbjørn Heggem", jersey: "17" }, { name: "Henrik Falchener", jersey: "25" },
            { name: "Sondre Langås", jersey: "24" }, { name: "David Møller Wolfe", jersey: "5" },
            { name: "Fredrik Bjørkan", jersey: "15" }, { name: "Julian Ryerson", jersey: "26" },
            { name: "Marcus Pedersen", jersey: "16" }, { name: "Sander Berge", jersey: "8" },
            { name: "Patrick Berg", jersey: "6" }, { name: "Fredrik Aursnes", jersey: "14" },
            { name: "Kristian Thorstvedt", jersey: "18" }, { name: "Morten Thorsby", jersey: "2" },
            { name: "Martin Ødegaard", jersey: "10" }, { name: "Thelo Aasgaard", jersey: "19" },
            { name: "Antonio Nusa", jersey: "20" }, { name: "Andreas Schjelderup", jersey: "21" },
            { name: "Jens Petter Hauge", jersey: "23" }, { name: "Oscar Bobb", jersey: "22" },
            { name: "Erling Haaland", jersey: "9" }, { name: "Jørgen Strand Larsen", jersey: "11" },
            { name: "Alexander Sørloth", jersey: "7" }
        ];

        const civPlayers = [
            { name: "Ousmane Diomande", jersey: "2" }, { name: "Ghislain Konan", jersey: "3" },
            { name: "Jean Michael Seri", jersey: "4" }, { name: "Wilfried Singo", jersey: "5" },
            { name: "Seko Fofana", jersey: "6" }, { name: "Odilon Kossounou", jersey: "7" },
            { name: "Franck Kessie", jersey: "8" }, { name: "Ange-Yoan Bonny", jersey: "9" },
            { name: "Simon Adingra", jersey: "10" }, { name: "Yan Diomande", jersey: "11" },
            { name: "Elye Wahi", jersey: "12" }, { name: "Christopher Operi", jersey: "13" },
            { name: "Oumar Diakite", jersey: "14" }, { name: "Amad Diallo", jersey: "15" },
            { name: "Guela Doue", jersey: "17" }, { name: "Ibrahim Sangare", jersey: "18" },
            { name: "Nicolas Pepe", jersey: "19" }, { name: "Emmanuel Agbadou", jersey: "20" },
            { name: "Evan Ndicka", jersey: "21" }, { name: "Evann Guessand", jersey: "22" },
            { name: "Bazoumana Traore", jersey: "24" }, { name: "Parfait Guiagon", jersey: "25" },
            { name: "Christ Inao Oulai", jersey: "26" }
        ];

        // Initialize database state using LocalStorage
        let ticketState = JSON.parse(localStorage.getItem('matchTicketsState')) || {};

        function generateTickets() {
            const container = document.getElementById('ticketsContainer');
            container.innerHTML = '';

            for (let i = 0; i < 23; i++) {
                const ticketId = `ticket_${i + 1}`;
                const isSold = ticketState[ticketId] ? 'sold' : '';
                const buyerName = ticketState[ticketId] || '';

                const ticketHTML = `
                    <div class="ticket ${isSold}" id="${ticketId}">
                        <div>
                            <div class="ticket-header">
                                <span>TICKET #${i + 1}</span>
                                <span>WC 2026</span>
                            </div>
                            <div class="team-section">
                                <div class="team-title">Norway 🇳🇴</div>
                                <div class="player-info">
                                    <span class="jersey">#${norwayPlayers[i].jersey}</span>
                                    <span class="hidden-name">${norwayPlayers[i].name}</span>
                                </div>
                            </div>
                            <div class="team-section">
                                <div class="team-title">Cote d'Ivoire 🇨🇮</div>
                                <div class="player-info">
                                    <span class="jersey">#${civPlayers[i].jersey}</span>
                                    <span class="hidden-name">${civPlayers[i].name}</span>
                                </div>
                            </div>
                        </div>
                        <div class="buyer-section">
                            <div class="buyer-input-group">
                                <input type="text" id="input_${ticketId}" placeholder="Enter Your Name">
                                <button onclick="buyTicket('${ticketId}')">Buy Ticket</button>
                            </div>
                            <div class="sold-text">SOLD TO: <span id="name_${ticketId}">${buyerName}</span></div>
                        </div>
                    </div>
                `;
                container.innerHTML += ticketHTML;
            }
        }

        function buyTicket(ticketId) {
            const inputField = document.getElementById(`input_${ticketId}`);
            const name = inputField.value.trim();
            
            if (name === '') {
                alert('Please enter your name to purchase the ticket!');
                return;
            }

            ticketState[ticketId] = name;
            localStorage.setItem('matchTicketsState', JSON.stringify(ticketState));
            
            // Apply Red Sold formatting
            const ticketElement = document.getElementById(ticketId);
            ticketElement.classList.add('sold');
            document.getElementById(`name_${ticketId}`).innerText = name;
        }

        function checkCode() {
            const codeInput = document.getElementById('revealCode').value.trim().toUpperCase();
            if (codeInput === 'RENEW') {
                document.body.classList.add('revealed');
            } else {
                document.body.classList.remove('revealed');
            }
        }

        // Build tickets on load
        generateTickets();
    </script>
</body>
</html>
